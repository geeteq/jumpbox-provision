stages:
  - generate-credentials
  - provision

variables:
  CONFIG_FILE: config.yaml

# Store your clouds.yaml content in GitLab CI/CD > Variables as CLOUDS_YAML (type: File).
# The pipeline writes it to the standard location before running any OpenStack commands.

.setup_clouds: &setup_clouds
  before_script:
    - mkdir -p ~/.config/openstack
    - echo "${CLOUDS_YAML}" > ~/.config/openstack/clouds.yaml

generate_api_key:
  stage: generate-credentials
  image: python:3.11-slim
  before_script:
    - pip install --quiet python-openstackclient
    - mkdir -p ~/.config/openstack
    - echo "${CLOUDS_YAML}" > ~/.config/openstack/clouds.yaml
  script:
    - bash generate_api_key.sh ~/.config/openstack/clouds.yaml "${CLOUD_NAME}" jumpbox-provision-cred
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

provision_vm:
  stage: provision
  image: python:3.11-slim
  timeout: 10 minutes
  <<: *setup_clouds
  before_script:
    - pip install --quiet openstacksdk pyyaml
    - mkdir -p ~/.config/openstack
    - echo "${CLOUDS_YAML}" > ~/.config/openstack/clouds.yaml
  script:
    - python provision_vm.py --config "${CONFIG_FILE}"
  variables:
    SSH_PUBLIC_KEY: "${SSH_PUBLIC_KEY}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  environment:
    name: jumpbox

dry_run_vm:
  stage: provision
  image: python:3.11-slim
  timeout: 5 minutes
  before_script:
    - pip install --quiet openstacksdk pyyaml
    - mkdir -p ~/.config/openstack
    - echo "${CLOUDS_YAML}" > ~/.config/openstack/clouds.yaml
  script:
    - python provision_vm.py --config "${CONFIG_FILE}" --dry-run
  variables:
    SSH_PUBLIC_KEY: "${SSH_PUBLIC_KEY}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
