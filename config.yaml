cloud: openstack   # name of the cloud entry in clouds.yaml

vm:
  name: "jumpbox"
  image: "rhel9"           # image name or UUID
  flavor: "m1.medium"      # flavor name or UUID
  network: "your-network"  # network name or UUID
  security_groups:
    - "default"
    - "ssh-access"
  availability_zone: "nova"
  floating_ip_pool: ""     # external network name or UUID; leave empty to skip

ssh:
  baremetal_user: "baremetal"
  public_key: ""
  # or specify a path to a public key file:
  # public_key_file: "~/.ssh/id_rsa.pub"

packages:
  - mtr
